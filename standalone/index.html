<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a5235" />
  <title>🏁 山地赛车 - Mountain Racer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 60%, #98d98e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 800px;
      max-height: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      background: #87ceeb;
    }
    @media (min-width: 820px) and (min-height: 620px) {
      #game-container { border-radius: 16px; }
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      font-size: 20px;
      color: #1a5235;
      font-weight: bold;
      text-align: center;
      z-index: 10;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #ff6b35;
      border-radius: 50%;
      margin: 0 auto 15px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <div id="loading">
        <div class="spinner"></div>
        <div>🚗 游戏加载中...</div>
      </div>
    </div>
  </div>

  <script src="js/phaser.min.js"></script>
  <script>
    if (typeof Phaser === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js';
      s.onerror = function() {
        var el = document.getElementById('loading');
        if (el) el.innerHTML = '<div style="color:#d32f2f;font-size:18px">❌ Phaser 加载失败</div><div style="font-size:13px;margin-top:10px;color:#666">请确保 js/phaser.min.js 文件存在，或连接网络后刷新</div>';
      };
      document.head.appendChild(s);
    }
  </script>

  <script src="js/modules/VersionMigration.js"></script>
  <script src="js/modules/PartsConfig.js"></script>
  <script src="js/modules/SeasonConfig.js"></script>
  <script src="js/modules/GarageManager.js"></script>
  <script src="js/modules/DataManager.js"></script>
  <script src="js/modules/HighScoreManager.js"></script>
  <script src="js/modules/UnlockManager.js"></script>
  <script src="js/modules/SettingsManager.js"></script>
  <script src="js/modules/SeasonDataManager.js"></script>
  <script src="js/modules/EventLevelManager.js"></script>
  <script src="js/modules/RewardSystem.js"></script>
  <script src="js/modules/CarGrowthSystem.js"></script>
  <script src="js/modules/ButtonLayoutStorage.js"></script>
  <script src="js/modules/Terrain.js"></script>
  <script src="js/modules/CarPhysics.js"></script>
  <script src="js/modules/Obstacles.js"></script>
  <script src="js/modules/DangerZones.js"></script>
  <script src="js/modules/Collectibles.js"></script>
  <script src="js/modules/ScoreManager.js"></script>
  <script src="js/modules/ButtonLayoutManager.js"></script>
  <script src="js/modules/InputManager.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/ChapterMapScene.js"></script>
  <script src="js/scenes/GarageScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
